{{ if .IsPage }}
  <section class="detail-actions print:hidden" aria-label="Ações da página">
    <button
      type="button"
      class="detail-action-button"
      data-copy-link
      data-url="{{ .Permalink }}">
      {{ partial "icon.html" "link" }}
      <span>Copiar ligação</span>
    </button>
    <p class="detail-action-feedback" data-action-feedback aria-live="polite"></p>
  </section>

  <script>
    (() => {
      const root = document.currentScript?.previousElementSibling;
      if (!root || root.dataset.actionsBound === "true") return;
      root.dataset.actionsBound = "true";

      const feedback = root.querySelector("[data-action-feedback]");
      const setFeedback = (message) => {
        if (feedback) feedback.textContent = message;
      };

      const copyButton = root.querySelector("[data-copy-link]");
      copyButton?.addEventListener("click", async () => {
        const url = copyButton.dataset.url;
        try {
          await navigator.clipboard.writeText(url);
          setFeedback("Ligação copiada.");
        } catch (error) {
          setFeedback("Não foi possível copiar automaticamente. Usa a ligação da barra do browser.");
        }
      });
    })();
  </script>
{{ end }}
